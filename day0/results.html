<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Day 0 — Baseline Results</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0d1117;color:#e6edf3;padding:20px;max-width:700px;margin:auto}
.locked{text-align:center;padding:60px 20px}
.locked h2{color:#f0883e;font-size:18px;margin-bottom:10px}
.locked p{color:#8b949e;font-size:13px}
.locked a{color:#58a6ff}
header{text-align:center;padding:20px 0}
header h1{color:#3fb950;font-size:20px}
header .sub{color:#8b949e;font-size:12px;margin-top:4px}
.score-wrap{display:flex;align-items:center;justify-content:center;gap:20px;margin:15px 0}
.score-circle{width:80px;height:80px;border-radius:50%;border:4px solid #3fb950;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#3fb950}
.score-label{text-align:left}
.score-label .big{font-size:28px;color:#e6edf3;font-weight:bold}
.score-label .dim{color:#8b949e;font-size:12px}
.topics{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0 20px}
.tag{padding:4px 10px;border-radius:12px;font-size:11px}
.tag-s{background:#23863633;color:#3fb950}
.tag-w{background:#f0883e33;color:#f0883e}
.motivation{background:#1f6feb15;border-left:3px solid #58a6ff;padding:12px 14px;border-radius:0 8px 8px 0;margin:15px 0;font-size:13px;color:#c9d1d9;line-height:1.5}
.q-row{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin:6px 0}
.q-row .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.q-row .head .num{color:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.badge-p{background:#23863633;color:#3fb950;font-size:10px;padding:2px 8px;border-radius:10px}
.badge-f{background:#f8514933;color:#f85149;font-size:10px;padding:2px 8px;border-radius:10px}
.q-row .question{color:#c9d1d9;font-size:12px;font-weight:600;margin-bottom:4px}
.q-row .detail{color:#8b949e;font-size:11px;margin:2px 0}
.q-row .correct{color:#3fb950}
.q-row .explain{color:#58a6ff;font-size:11px;margin-top:4px;font-style:italic;padding-top:4px;border-top:1px solid #21262d}
.q-row.wrong{border-left:3px solid #f85149}
.q-row.right{border-left:3px solid #3fb950}
footer{text-align:center;padding:20px 0;color:#484f58;font-size:10px}
footer a{color:#58a6ff}
</style>
</head>
<body>

<div class="locked" id="lockedMsg" style="display:none">
<h2>No Results Yet</h2>
<p>Complete the Day 0 assessment first.</p>
<p style="margin-top:15px"><a href="assessment.html">Take Assessment</a></p>
</div>

<div id="resultsContent" style="display:none">
<header>
<h1>Day 0 Baseline Complete</h1>
<div class="sub">Baseline assessment - no pass/fail, just a starting point</div>
</header>

<div class="score-wrap">
<div class="score-circle" id="scoreCircle">--</div>
<div class="score-label">
<div class="big" id="scoreText">--</div>
<div class="dim" id="scoreSub">correct answers</div>
</div>
</div>

<div class="topics" id="topicsWrap"></div>
<div class="motivation" id="motivationMsg"></div>
<div id="answersList"></div>
</div>

<footer>
<a href="../">Home</a>
</footer>

<script>
const QS = {
  1: "What does the /plan command do in Claude Code?",
  2: "Have you successfully run Claude Code CLI?",
  3: "What is CLAUDE.md used for?",
  4: "Which are real Claude Code slash commands?",
  5: "Why run /compact during a long session?",
  6: "What does it mean to give Claude Code 'context'?",
  7: "Did you create/update a CLAUDE.md file?",
  8: "What does /init do in a new project?"
};
const CORRECT = {
  1: "B - Asks Claude to think through an approach before writing code",
  2: "Yes or No - self-reported",
  3: "B - Claude Code's persistent project memory",
  4: "/plan, /compact, /clear, /init (not /deploy or /search)",
  5: "B - Reduce context window usage so Claude stays accurate",
  6: "Text answer - evaluated by AI mentor",
  7: "Yes or No - self-reported",
  8: "C - Analyze your project and generate a CLAUDE.md"
};
const WHY = {
  1: "/plan tells Claude to research first, like a senior dev planning before coding.",
  2: "Hands-on practice matters. If not yet, Day 1 covers it!",
  3: "CLAUDE.md is Claude's memory. It reads it every session for project context.",
  4: "Real: /plan, /compact, /clear, /init. /deploy and /search don't exist as built-in commands.",
  5: "Long chats fill Claude's context. /compact summarizes so Claude stays sharp.",
  6: "Context = giving Claude info about your project so it understands what you're building.",
  7: "Creating CLAUDE.md is key. We'll do it in Day 1.",
  8: "/init scans your project and auto-generates a CLAUDE.md with project knowledge."
};

fetch('../api/status.json?'+Date.now())
.then(r=>r.json())
.then(d=>{
  const s=d.days['0'];
  if(!s||s.status!=='completed'){
    document.getElementById('lockedMsg').style.display='block';
    return;
  }
  document.getElementById('resultsContent').style.display='block';
  const pct=s.score||0;
  document.getElementById('scoreCircle').textContent=pct+'%';
  document.getElementById('scoreText').textContent=(s.correctAnswers||'?')+'/'+(s.totalQuestions||'?');
  
  // Topics
  let tags='';
  if(s.strongTopics) s.strongTopics.forEach(t=>tags+='<span class="tag tag-s">Strong: '+t+'</span> ');
  if(s.weakTopics) s.weakTopics.forEach(t=>tags+='<span class="tag tag-w">Review: '+t+'</span> ');
  document.getElementById('topicsWrap').innerHTML=tags;

  // Motivation
  let msg='';
  if(pct>=80) msg='Great job! You already know your stuff. Day 1 will sharpen what you know and fill the gaps. Let\'s go!';
  else if(pct>=50) msg='Solid foundation! Day 1 will strengthen the areas you missed - that\'s exactly what the bootcamp is for.';
  else msg='Everyone starts somewhere! Day 1 is designed to teach you everything from scratch. You\'ll pick it up faster than you think!';
  document.getElementById('motivationMsg').textContent=msg;

  // Load detailed answers from results API
  return fetch('../api/results-day0.json?'+Date.now()).then(r=>r.json()).then(r=>({s,r}));
})
.then(data=>{
  if(!data||!data.r||!data.r.answers) return;
  const answers=data.r.answers;
  let html='';
  answers.forEach(a=>{
    const qText=QS[a.q]||('Question '+a.q);
    const isPass=a.pass!==false;
    const cls=isPass?'right':'wrong';
    const badge=isPass?'<span class="badge-p">Correct</span>':'<span class="badge-f">Wrong</span>';
    
    let yourAns='';
    if(a.type==='choice') yourAns='Your answer: '+(a.selected||'No answer');
    else if(a.type==='yesno') yourAns='Your answer: '+(a.selected||'No answer');
    else if(a.type==='multi') yourAns='Your answer: '+(a.selected?a.selected.join(', '):'None');
    else if(a.type==='text') yourAns='Your answer: "'+(a.answer||'No answer')+'"';
    
    let correctAns='';
    if(a.correct) correctAns='<div class="detail correct">Correct: '+CORRECT[a.q]+'</div>';
    
    const why=WHY[a.q]?'<div class="explain">Why: '+WHY[a.q]+'</div>':'';

    html+='<div class="q-row '+cls+'"><div class="head"><span class="num">Q'+a.q+' ('+a.type+')</span>'+badge+'</div><div class="question">'+qText+'</div><div class="detail">'+yourAns+'</div>'+correctAns+why+'</div>';
  });
  document.getElementById('answersList').innerHTML=html;
});
</script>
</body>
</html>
