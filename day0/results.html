<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Day 0 — Baseline Results</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0d1117;color:#e6edf3;padding:20px;max-width:700px;margin:auto}
.locked{text-align:center;padding:60px 20px}
.locked h2{color:#f0883e;font-size:18px;margin-bottom:10px}
.locked p{color:#8b949e;font-size:13px}
.locked a{color:#58a6ff}
header{text-align:center;padding:20px 0}
header h1{color:#3fb950;font-size:20px}
header .sub{color:#8b949e;font-size:12px;margin-top:4px}
.score-wrap{display:flex;align-items:center;justify-content:center;gap:20px;margin:15px 0}
.score-circle{width:80px;height:80px;border-radius:50%;border:4px solid #3fb950;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#3fb950}
.score-label{text-align:left}
.score-label .big{font-size:28px;color:#e6edf3;font-weight:bold}
.score-label .dim{color:#8b949e;font-size:12px}
.topics{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0 20px}
.tag{padding:4px 10px;border-radius:12px;font-size:11px}
.tag-s{background:#23863633;color:#3fb950}
.tag-w{background:#f0883e33;color:#f0883e}
.motivation{background:#1f6feb15;border-left:3px solid #58a6ff;padding:12px 14px;border-radius:0 8px 8px 0;margin:15px 0;font-size:13px;color:#c9d1d9;line-height:1.5}
.q-row{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin:6px 0}
.q-row .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.q-row .head .num{color:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.q-row .head .badge{font-size:10px;padding:2px 8px;border-radius:10px}
.badge-pass{background:#23863633;color:#3fb950}
.badge-fail{background:#f8514933;color:#f85149}
.q-row .question{color:#c9d1d9;font-size:12px;font-weight:600;margin-bottom:4px}
.q-row .your-answer{color:#8b949e;font-size:11px}
.q-row .correct-answer{color:#3fb950;font-size:11px}
.q-row .explanation{color:#58a6ff;font-size:11px;margin-top:4px;font-style:italic}
footer{text-align:center;padding:20px 0;color:#484f58;font-size:10px}
footer a{color:#58a6ff}
</style>
</head>
<body>

<div class="locked" id="lockedMsg" style="display:none">
<h2>🔒 No Results Yet</h2>
<p>Complete the Day 0 assessment first.</p>
<p style="margin-top:15px"><a href="assessment.html">← Take Assessment</a></p>
</div>

<div id="resultsContent" style="display:none">
<header>
<h1>✅ Day 0 Baseline Complete</h1>
<div class="sub">Baseline assessment — no pass/fail, just a starting point</div>
</header>

<div class="score-wrap">
<div class="score-circle" id="scoreCircle">--</div>
<div class="score-label">
<div class="big" id="scoreText">--</div>
<div class="dim" id="scoreSub">Loading...</div>
</div>
</div>

<div class="topics" id="topicsWrap"></div>

<div class="motivation" id="motivationMsg">Loading your personalized feedback...</div>

<div id="answersList"></div>
</div>

<footer>
<a href="../">← Home</a> · <a href="../day1/index.html">Day 1 Schedule →</a>
</footer>

<script>
// Question definitions for display
const QS={
1:{q:"What does the /plan command do in Claude Code?",opts:{A:"Opens a project calendar",B:"Asks Claude to think through an approach before writing code",C:"Creates a new GitHub repository",D:"Lists all available slash commands"}},
2:{q:"Have you successfully run Claude Code CLI?",yes:"Yes, ran it",no:"Not yet"},
3:{q:"What is CLAUDE.md used for?",opts:{A:"Storing API keys",B:"Persistent project memory that survives between sessions",C:"Required config for GitHub",D:"Markdown version of README"}},
4:{q:"Which are real Claude Code slash commands?",opts:{0:"/plan",1:"/deploy",2:"/compact",3:"/search",4:"/clear",5:"/init"}},
5:{q:"Why run /compact during a long session?",opts:{A:"Save file to GitHub",B:"Reduce context window so Claude stays accurate",C:"Restart terminal",D:"Run tests"}},
6:{q:"In one sentence — what does it mean to give Claude Code 'context'?"},
7:{q:"Did you create/update a CLAUDE.md file?",yes:"Yes",no:"No"},
8:{q:"What does /init do in a new project?",opts:{A:"Install Node.js deps",B:"Create GitHub repo",C:"Analyze project and generate CLAUDE.md",D:"Run test suite"}}
};

const EXPLAIN={
1:"The /plan command tells Claude to research and think before writing code — like a senior dev planning before coding.",
2:"Running the CLI is hands-on practice. If not yet — that's Day 1!",
3:"CLAUDE.md is Claude's memory file. It reads it every session to understand your project rules and conventions.",
4:"Real commands: /plan, /compact, /clear, /init. /deploy and /search don't exist as built-in slash commands.",
5:"Long conversations fill Claude's context window. /compact summarizes the chat so Claude stays sharp.",
6:"Context means giving Claude information about your project — what it does, your conventions, what you're trying to build.",
7:"Creating CLAUDE.md is a key practice. We'll do it in Day 1.",
8:"/init analyzes your entire project and auto-generates a CLAUDE.md with project-specific knowledge."
};

fetch('../api/status.json?'+Date.now())
.then(r=>r.json())
.then(d=>{
  const s=d.days['0'];
  if(!s||s.status!=='completed'){
    document.getElementById('lockedMsg').style.display='block';
    return;
  }
  document.getElementById('resultsContent').style.display='block';

  // Score
  const pct=s.score||0;
  document.getElementById('scoreCircle').textContent=pct+'%';
  document.getElementById('scoreText').textContent=s.correctAnswers+'/'+s.totalQuestions;
  document.getElementById('scoreSub').textContent='correct answers';

  // Topics
  let tags='';
  if(s.strongTopics) s.strongTopics.forEach(t=>tags+='<span class="tag tag-s">💪 '+t+'</span>');
  if(s.weakTopics) s.weakTopics.forEach(t=>tags+='<span class="tag tag-w">🔍 '+t+'</span>');
  document.getElementById('topicsWrap').innerHTML=tags;

  // Motivation
  let msg='';
  if(pct>=80) msg='Great job Hoss! 🎉 You already know your stuff. Day 1 will sharpen what you know and fill the gaps. Let\'s go!';
  else if(pct>=50) msg='Solid foundation! 👍 You\'ve got the basics down. Day 1 will strengthen the areas you missed — that\'s exactly what the bootcamp is for.';
  else msg='Everyone starts somewhere! 💪 Day 1 is designed to teach you everything from scratch. You\'ll pick it up faster than you think. Let\'s build!';
  document.getElementById('motivationMsg').textContent=msg;
});
</script>
</body>
</html>
