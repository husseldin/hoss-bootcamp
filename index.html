<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hoss Bootcamp — Home Base</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#e6edf3;padding:20px;max-width:720px;margin:auto}
header{text-align:center;padding:30px 0 10px}
header h1{font-size:22px;margin-bottom:5px}
header h1 span.blue{color:#58a6ff}
header h1 span.dim{color:#484f58}
.subtitle{color:#8b949e;font-size:13px;margin-bottom:20px}
.progress-wrap{background:#21262d;border-radius:10px;padding:12px 16px;margin-bottom:20px;text-align:center}
.progress-bar{background:#30363d;border-radius:6px;height:10px;overflow:hidden;margin:8px 0}
.progress-fill{background:linear-gradient(90deg,#238636,#3fb950);height:100%;border-radius:6px;transition:width 0.5s}
.progress-text{color:#8b949e;font-size:11px}
.day{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 16px;margin:8px 0;display:flex;align-items:center;gap:14px;transition:border-color 0.2s}
.day:hover{border-color:#30363d}
.day.completed{border-color:#23863633}
.day.active{border-color:#58a6ff55;background:#161b2280}
.day.locked{opacity:0.45;pointer-events:none}
.day-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.day.completed .day-icon{background:#23863622;color:#3fb950}
.day.active .day-icon{background:#1f6feb22;color:#58a6ff}
.day.locked .day-icon{background:#21262d;color:#484f58}
.day-info{flex:1;min-width:0}
.day-label{color:#8b949e;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.day-title{color:#e6edf3;font-size:15px;font-weight:600;margin:2px 0}
.day-desc{color:#8b949e;font-size:11px}
.day-score{color:#8b949e;font-size:11px;margin-top:2px}
.day-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.day-links a{background:#21262d;color:#58a6ff;padding:3px 8px;border-radius:4px;text-decoration:none;font-size:10px;border:1px solid #30363d}
.day-links a:hover{background:#30363d}
.day-links a.disabled{color:#484f58;pointer-events:none;border-color:#21262d}
.score-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;flex-shrink:0}
.score-pass{background:#23863633;color:#3fb950}
.score-warn{background:#d2992233;color:#d29922}
.loading{text-align:center;padding:40px;color:#484f58}
footer{text-align:center;padding:20px 0;color:#484f58;font-size:10px}
footer a{color:#58a6ff;text-decoration:none}
</style>
</head>
<body>
<header>
<h1><span class="blue">🚀</span> 7-Day AI Director Sprint</h1>
<div class="subtitle">Student: Hossam Darwish · AI Director Bootcamp</div>
</header>

<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="progress-text" id="progressText">Loading...</div>
</div>

<div id="days"></div>
<div class="loading" id="loading">Loading progress...</div>

<footer>
Hoss Bootcamp · AI Director Sprint · 2026<br>
<a href="https://claude.nagdy.me" target="_blank">Claude Code Reference</a> · 
<a href="https://github.com/HussEldin/hoss-bootcamp" target="_blank">GitHub</a>
</footer>

<script>
const DAYS=[
{n:0,title:"Baseline Check",desc:"Where are you now? Quick check, no pressure."},
{n:1,title:"AI Director Toolkit",desc:"Terminal, Git, VS Code, first API call, debugging."},
{n:2,title:"Architecture & System Design",desc:"Components, data flow, system thinking."},
{n:3,title:"Backend Basics",desc:"APIs, databases, server logic."},
{n:4,title:"Frontend Basics",desc:"HTML/CSS/JS, connecting to your backend."},
{n:5,title:"DevOps & Deployment",desc:"CI/CD, hosting, going live."},
{n:6,title:"Docker & CI/CD",desc:"Containerization, pipelines, automation."},
{n:7,title:"Capstone Project",desc:"Put it all together. Ship something real."}
];

fetch('api/status.json?'+Date.now())
.then(r=>r.json())
.then(data=>{
  document.getElementById('loading').style.display='none';
  const daysEl=document.getElementById('days');
  let completed=0;
  
  for(const d of DAYS){
    const s=data.days[d.n];
    if(!s)continue;
    let cls='locked',icon='🔒',links='';
    
    if(s.status==='completed'){
      cls='completed';icon='✅';completed++;
      const pct=s.totalQuestions?Math.round(s.correctAnswers/s.totalQuestions*100):0;
      links=`<div class="day-links"><a href="day${d.n}/results.html">📊 Results</a></div>`;
    }else if(s.status==='active'){
      cls='active';icon='🔄';
      if(d.n===0){
        links=`<div class="day-links"><a href="day0/assessment.html">📝 Take Assessment</a></div>`;
      }else{
        if(s.blocks&&s.blocks.length>0){
          links=`<div class="day-links">
            <a href="day${d.n}/index.html">📋 Schedule</a>
            <a href="day${d.n}/guidance.html">📚 Guidance</a>
          </div>`;
        }else{
          links=`<div class="day-links"><a href="day${d.n}/index.html">📋 Schedule</a></div>`;
        }
        if(s.dayAssessment===null&&s.currentBlock>=s.totalBlocks){
          links+=`<a href="day${d.n}/assessment.html">📝 Day Assessment</a>`;
        }
      }
    }else{
      links=`<div class="day-links"><span style="color:#484f58;font-size:10px">Unlocks after Day ${d.n>0?d.n-1:0}</span></div>`;
    }
    
    daysEl.innerHTML+=`<div class="day ${cls}">
      <div class="day-icon">${icon}</div>
      <div class="day-info">
        <div class="day-label">Day ${d.n}</div>
        <div class="day-title">${d.title}</div>
        <div class="day-desc">${d.desc}</div>
        ${s.status==='completed'&&s.score?`<div class="day-score">Score: ${s.correctAnswers}/${s.totalQuestions} (${s.score}%)</div>`:''}
        ${links}
      </div>
      ${s.status==='completed'&&s.score?`<div class="score-circle ${s.score>=70?'score-pass':'score-warn'}">${s.score}%</div>`:''}
    </div>`;
  }
  
  const pct=Math.round(completed/8*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=`Progress: ${completed}/8 days completed (${pct}%)`;
})
.catch(err=>{
  document.getElementById('loading').textContent='Error loading progress. Try refreshing.';
  console.error(err);
});
</script>
</body>
</html>
